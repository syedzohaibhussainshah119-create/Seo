<?xml version="1.0" encoding="UTF-8"?>
<!-- Feature image: Education - 1600x900 SVG -->
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="45%" stop-color="#eaf3ff"/>
      <stop offset="100%" stop-color="#dfeefe"/>
    </linearGradient>
    <radialGradient id="sun" cx="20%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#fff9e8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff9e8" stop-opacity="0.0"/>
    </radialGradient>
    <linearGradient id="deskGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e7d7c7"/>
      <stop offset="100%" stop-color="#d9c6b2"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
      <feOffset dx="0" dy="8" result="offset"/>
      <feMerge>
        <feMergeNode in="offset"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; fill: #0b3b6f; font-weight: 700; }
      .subtitle { font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; fill: #0b3b6f; opacity: 0.85; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#sun)" />

  <!-- Soft vignette for focus -->
  <ellipse cx="800" cy="400" rx="820" ry="520" fill="#000" opacity="0.02"/>

  <!-- Distant classroom / shelves silhouette -->
  <g opacity="0.12" transform="translate(80,60)">
    <rect x="0" y="140" width="1280" height="260" rx="18" fill="#c9e0ff" />
    <g fill="#b6d3ff" transform="translate(30,170)">
      <rect x="0" y="0" width="160" height="160" rx="6" />
      <rect x="190" y="0" width="160" height="160" rx="6" />
      <rect x="380" y="0" width="160" height="160" rx="6" />
      <rect x="570" y="0" width="160" height="160" rx="6" />
      <rect x="760" y="0" width="160" height="160" rx="6" />
      <rect x="950" y="0" width="160" height="160" rx="6" />
      <rect x="1140" y="0" width="160" height="160" rx="6" />
    </g>
  </g>

  <!-- Desk surface -->
  <g transform="translate(0,520)">
    <rect x="0" y="0" width="1600" height="320" fill="url(#deskGrad)"/>
    <rect x="40" y="-8" width="1520" height="24" rx="6" fill="#fff" opacity="0.35"/>
  </g>

  <!-- Objects on desk -->
  <g transform="translate(120,560)" filter="url(#softShadow)">
    <!-- Stack of books -->
    <g transform="translate(0,40)">
      <rect x="0" y="0" width="210" height="30" rx="4" fill="#3b6fb2" />
      <rect x="6" y="-28" width="198" height="30" rx="4" fill="#f06b6b" />
      <rect x="12" y="-56" width="186" height="30" rx="4" fill="#ffd166" />
      <rect x="18" y="-84" width="174" height="30" rx="4" fill="#7fb77e" />
      <rect x="6" y="-100" width="210" height="8" rx="3" fill="#e6e6e6" opacity="0.6" />
    </g>

    <!-- Coffee cup -->
    <g transform="translate(240,36)">
      <ellipse cx="30" cy="58" rx="34" ry="12" fill="#fff" opacity="0.9"/>
      <rect x="0" y="0" width="60" height="58" rx="10" fill="#fff"/>
      <circle cx="46" cy="28" r="6" fill="#fff"/>
      <rect x="60" y="22" width="16" height="28" rx="8" fill="#fff"/>
      <rect x="6" y="6" width="48" height="12" rx="6" fill="#f4e3d2"/>
      <rect x="6" y="22" width="48" height="28" rx="6" fill="#6f4e37"/>
    </g>

    <!-- Potted plant -->
    <g transform="translate(320,20)">
      <rect x="0" y="56" width="60" height="30" rx="8" fill="#6a8f6a"/>
      <ellipse cx="30" cy="56" rx="38" ry="14" fill="#cfe9cf"/>
      <path d="M30 54 C22 40, 8 40, 6 28 C16 34, 20 22, 30 20 C40 22, 44 34, 54 28 C52 40, 38 40, 30 54 Z" fill="#2e7d32"/>
    </g>
  </g>

  <!-- Laptop -->
  <g transform="translate(620,490)" filter="url(#softShadow)">
    <!-- base -->
    <rect x="0" y="90" width="540" height="18" rx="8" fill="#b3c9e6"/>
    <rect x="-6" y="0" width="552" height="108" rx="10" fill="#f5f8fb"/>
    <rect x="8" y="8" width="524" height="80" rx="6" fill="#0b3b6f"/>
    <!-- screen content: open book -->
    <g transform="translate(40,20)" opacity="0.96">
      <rect x="0" y="0" width="220" height="52" rx="4" fill="#e8f1ff"/>
      <path d="M6 8 h98 a6 6 0 0 1 6 6 v28 a6 6 0 0 1 -6 6 h-98" fill="#fff"/>
      <path d="M116 8 h98 a6 6 0 0 0 6 6 v28 a6 6 0 0 0 -6 6 h-98" fill="#fff"/>
      <path d="M112 12 v40" stroke="#d0dff4" stroke-width="2"/>
      <g fill="#b6cfe9">
        <rect x="12" y="16" width="84" height="4" rx="2"/>
        <rect x="12" y="24" width="72" height="4" rx="2"/>
        <rect x="128" y="16" width="80" height="4" rx="2"/>
        <rect x="128" y="24" width="68" height="4" rx="2"/>
      </g>
    </g>
  </g>

  <!-- Graduation cap (iconic education element) -->
  <g transform="translate(1180,420) scale(1.05)" filter="url(#softShadow)">
    <polygon points="0,28 120,0 240,28 120,56" fill="#0b3b6f"/>
    <rect x="104" y="52" width="32" height="26" transform="rotate(6 120 65)" fill="#0b3b6f" rx="3"/>
    <circle cx="120" cy="30" r="4" fill="#ffd166"/>
    <path d="M120 30 L170 48" stroke="#ffd166" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Title text -->
  <g transform="translate(120,120)">
    <text x="0" y="0" class="title" font-size="56">Education</text>
    <text x="0" y="46" class="subtitle" font-size="22">Learning, growth, and discovery — resources for learners</text>
  </g>

  <!-- Soft light flare -->
  <g opacity="0.08" transform="translate(1100,-60)">
    <circle cx="120" cy="120" r="120" fill="#fff9d1"/>
  </g>

  <!-- Foreground subtle shadow -->
  <rect x="0" y="640" width="1600" height="260" fill="#000" opacity="0.02"/>

  <!-- Export friendly background for platforms that need 1.91:1 crop -->
</svg>
